<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SHOPEasyy India - Login & SignUp</title>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;600;700;800&family=Hind:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="login-style.css">
</head>
<body>

<div class="auth-container">
  <div class="auth-card">
    <!-- HEADER -->
    <div class="auth-header">
      <div class="auth-logo">SHOP<span>Easyy</span></div>
      <p class="auth-subtitle">🇮🇳 भारत की अपनी दुकान</p>
    </div>

    <!-- TOGGLE BUTTONS -->
    <div class="auth-toggle">
      <button class="toggle-btn active" id="loginTab" onclick="switchTab('login')">🔓 Login</button>
      <button class="toggle-btn" id="signupTab" onclick="switchTab('signup')">✍️ Sign Up</button>
    </div>

    <!-- LOGIN FORM -->
    <form id="loginForm" class="auth-form active" onsubmit="handleLogin(event)">
      <h2>Welcome Back!</h2>
      <div class="form-group">
        <label>📧 Email or 📱 Mobile No</label>
        <input type="text" id="loginEmail" placeholder="Enter email or mobile number" required>
      </div>
      <div class="form-group">
        <label>🔐 Password</label>
        <input type="password" id="loginPassword" placeholder="Enter your password" required>
      </div>
      <div class="form-message" id="loginMessage"></div>
      <button type="submit" class="auth-btn">Login →</button>
    </form>

    <!-- SIGNUP FORM -->
    <form id="signupForm" class="auth-form" onsubmit="handleSignup(event)">
      <h2>Create Account</h2>
      <div class="form-group">
        <label>👤 Full Name</label>
        <input type="text" id="signupName" placeholder="Enter your full name" required>
      </div>
      <div class="form-group">
        <label>📱 Mobile Number</label>
        <input type="tel" id="signupMobile" placeholder="Enter 10-digit mobile number" pattern="[0-9]{10}" required>
      </div>
      <div class="form-group">
        <label>📧 Email Address</label>
        <input type="email" id="signupEmail" placeholder="Enter your email" required>
      </div>
      <div class="form-group">
        <label>🔐 Password</label>
        <input type="password" id="signupPassword" placeholder="Create a password (min 6 characters)" minlength="6" required>
      </div>
      <div class="form-group">
        <label>🔐 Confirm Password</label>
        <input type="password" id="signupConfirm" placeholder="Confirm your password" required>
      </div>
      <div class="form-message" id="signupMessage"></div>
      <button type="submit" class="auth-btn">Create Account →</button>
    </form>

    <!-- FOOTER -->
    <div class="auth-footer">
      <p>By signing up, you agree to our <a href="#">Terms & Conditions</a></p>
      <p class="demo-note">💡 Demo Mode: Data saved locally (browser storage)</p>
    </div>
  </div>
</div>

<script src="auth.js"></script>
</body>
</html>
